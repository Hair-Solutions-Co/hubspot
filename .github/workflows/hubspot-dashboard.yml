name: hubspot-dashboard — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "99-development/design-manager/hubspot-dashboard/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hairsolutionsco/hubspot-dashboard
  DASHBOARD_DIR: 99-development/design-manager/hubspot-dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ${{ env.DASHBOARD_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ${{ env.DASHBOARD_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - name: Deploy to Hostinger VPS
        env:
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY }}
          HOSTINGER_VPS_ID: ${{ secrets.HOSTINGER_VPS_ID }}
        run: node scripts/deploy-hostinger.mjs
